<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/img/sinaertebat.png" />
    <link rel="stylesheet" href="style/global.css" />
    <link rel="stylesheet" href="style/index.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شرکت مهندسی الکترونیک سینا ارتباط</title>
  </head>
  <body>
    <div>
      <div class="posterContainer">
        <button class="photoBtnBox" id="previous">
          <img src="img/previous-arrow.png" class="photoButtons" />
        </button>
        <div class="posterBox">
          <img
            src="/img/carousel-1.jpg"
            alt=""
            class="horizentalPosters"
            id="first"
          />
          <img
            src="/img/carousel-2.jpg"
            alt=""
            class="horizentalPosters"
            id="second"
          />
          <img
            src="/img/carousel-3.jpg"
            alt=""
            class="horizentalPosters"
            id="third"
          />
        </div>
        <div class="mobilePosters">
          <img
            src="/img/vertical-carousel-1.png"
            alt=""
            class="verticalPosters"
            id="vertical-one"
          />
          <img
            src="/img/vertical-carousel-2.png"
            alt=""
            class="verticalPosters"
            id="vertical-two"
          />
          <img
            src="/img/vertical-carousel-2.png"
            alt=""
            class="verticalPosters"
            id="vertical-three"
          />
        </div>
        <button class="photoBtnBox" id="next">
          <img src="img/next-arrow.png" class="photoButtons" />
        </button>
      </div>
      <div class="dotBox">
        <img
          class="posterDot"
          id="first-dot"
          src="img/inactive-dot.png"
          alt=""
        />
        <img
          class="posterDot"
          id="second-dot"
          src="img/inactive-dot.png"
          alt=""
        />
        <img
          class="posterDot"
          id="third-dot"
          src="img/inactive-dot.png"
          alt=""
        />
      </div>
    </div>
    <main></main>

    <script type="module" src="/src/main.jsx"></script>
    <script type="module" src="./public/js/app.js"></script>
  </body>
</html>
